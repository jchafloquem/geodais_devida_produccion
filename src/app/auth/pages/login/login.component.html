<div class="relative min-h-screen flex items-center justify-center overflow-hidden bg-gray-900">
  <!-- Imagen de fondo con animación -->
  <div class="background-image"
       [style.backgroundImage]="backgrounds[0].url"
       [class.fade-out]="backgrounds[0].fade"></div>
  <div class="background-image"
       [style.backgroundImage]="backgrounds[1].url"
       [class.fade-out]="backgrounds[1].fade"></div>
  <!-- Overlay oscuro para mejorar contraste -->
  <div class="absolute inset-0 bg-black bg-opacity-50"></div>
  <!-- Logo en la esquina superior izquierda -->
  <div class="absolute top-4 left-4 z-10">
    <!-- Logo grande para pantallas sm y mayores -->
    <img class="h-16 w-auto hidden sm:block" src="assets/images/logos/logoWelBN.png" alt="DEVIDA" />
    <!-- Logo mini para pantallas pequeñas (móviles). 'block' es añadido para ser más explícito. -->
    <img class="h-16 w-auto block sm:hidden" src="assets/images/logos/logoWelBNMini.png" alt="DEVIDA" />
  </div>
  <!-- Contenedor principal -->
  <div class="relative z-10 w-full max-w-4xl mx-auto p-4">
    <div class="flex bg-white/10 backdrop-blur-sm rounded-lg overflow-hidden border border-white/20 shadow-[0_0_25px_rgba(255,255,255,0.3)]">
      <!-- Columna Izquierda: Imagen -->
      <div class="w-1/2 hidden md:block bg-cover bg-center animate-column-image" [style.backgroundImage]="currentColumnImage">
        <!-- La imagen de fondo se controla por CSS con animación -->
      </div>

      <!-- Columna Derecha: Formulario -->
      <div class="w-full md:w-1/2 p-6 sm:p-12 flex flex-col justify-center">
        <!-- Logo del componente -->
        <div class="flex justify-center mb-4">
          <img class="h-24 w-auto" src="assets/images/logos/usuario.png" alt="Logo GeoCultivos" />
        </div>
        <!-- Título -->
        <h2 class="text-center text-3xl sm:text-4xl py-6 font-extrabold text-white font-poppins">
          INICIAR SESIÓN
        </h2>
        <!-- Formulario -->
        <div class="mt-8">
          <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-5">
            <!-- Campo Usuario -->
            <div>
              <label for="usuario" class="block text-lg font-medium text-white">Usuario</label>
              <input
                type="text"
                id="usuario"
                placeholder="Ingrese su usuario"
                formControlName="usuario"
                class="w-full p-3 rounded-lg border border-gray-300 bg-gray-50 focus:ring-primary-500 focus:border-primary-500 text-gray-900 dark:bg-gray-700 dark:text-white dark:border-gray-600"
              />
              <small *ngIf="isRequired('usuario')" class="text-white">Este campo es requerido</small>
            </div>
            <!-- Campo Contraseña -->
            <div>
              <label for="password" class="block text-lg font-medium text-white">Contraseña</label>
              <div class="relative">
                <input
                  [type]="passwordVisible ? 'text' : 'password'"
                  id="password"
                  placeholder="Contraseña"
                  formControlName="password"
                  class="w-full p-3 pr-12 rounded-lg border border-gray-300 bg-gray-50 focus:ring-primary-500 focus:border-primary-500 text-gray-900 dark:bg-gray-700 dark:text-white dark:border-gray-600"
                />
                <button
                  type="button"
                  (click)="togglePasswordVisibility()"
                  class="absolute inset-y-0 right-0 flex items-center px-4 text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-white"
                  aria-label="Mostrar u ocultar contraseña"
                >
                  <!-- Icono de "ojo" para mostrar -->
                  <svg *ngIf="!passwordVisible" class="w-6 h-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639l4.43-7.086a1.012 1.012 0 011.638 0l4.43 7.086a1.012 1.012 0 010 .639l-4.43 7.086a1.012 1.012 0 01-1.638 0l-4.43-7.086z" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                  </svg>
                  <!-- Icono de "ojo tachado" para ocultar -->
                  <svg *ngIf="passwordVisible" class="w-6 h-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.243 4.243l-4.243-4.243" />
                  </svg>
                </button>
              </div>
              <small *ngIf="isRequired('password')" class="text-white">Este campo es requerido</small>
            </div>
            <!-- Botón de Ingreso -->
            <div class="flex flex-col items-center gap-4">
              <button
                type="submit"
                class="w-full bg-primary hover:bg-secondary transition-all text-white font-medium rounded-lg text-lg px-5 py-3 focus:ring-4 focus:outline-none focus:ring-primary-300 dark:bg-primary-600 dark:hover:bg-primary-700 dark:focus:ring-primary-800"
              >
                INGRESAR
              </button>
              <!-- Contenedor para mostrar mensajes de error -->
              <div *ngIf="loginError" class="w-full mt-2 text-center p-2 rounded-lg bg-red-500/20 border border-red-500 text-white">
                {{ loginError }}
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
