<!-- Navbar -->
<div
  id="navbar"
  class="fixed top-0 flex items-center justify-between w-full bg-primary px-3 h-16 z-10 shadow-lg"
>
  <!-- Logo izquierdo -->
  <div class="flex items-center gap-6">
    <!-- Logos -->
    <div class="hidden md:block">
      <img
        class="h-14 rounded-md drop-shadow-[0_12px_24px_rgba(255,255,255,1)] transition-all duration-300 ease-in-out hover:scale-110 hover:drop-shadow-[0_20px_32px_rgba(255,255,255,1)]"
        src="assets/images/logos/logoWelBN.png"
        alt="Logo grande"
      />
    </div>
    <div class="block md:hidden">
      <img
        class="h-14 rounded-md drop-shadow-[0_12px_24px_rgba(255,255,255,1)] transition-all duration-300 ease-in-out hover:scale-110 hover:drop-shadow-[0_20px_32px_rgba(255,255,255,1)]"
        src="assets/images/logos/logoWelBNMini.png"
        alt="Logo pequeño"
      />
    </div>
  </div>
  <!-- Título centrado -->
  <div
    (click)="reajustarMapa()"
    title="Reajustar vista del mapa"
    class="text-center text-xl lg:text-3xl font-bold text-white cursor-pointer"
    style="
      font-family: 'Roboto', sans-serif;
      text-shadow: 1px 1px 2px rgba(100, 100, 100, 0.7);
    "
  >
      GEOCULTIVOS DAIS
  </div>
  <!-- Contenedor derecho (search + logout) -->
  <div class="flex items-center gap-2">
   <!-- Botón de logout -->
    <button
      (click)="logout()"
      class="w-10 h-10 flex items-center justify-center rounded-full bg-secondary hover:bg-secondary active:bg-gray-300 shadow-md transition"
      aria-label="Cerrar sesión"
      title="Cerrar sesión"
    >
      <svg
        class="w-5 h-5 text-white"
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.8"
        stroke="currentColor"
      >
        <!-- Marco -->
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6A2.25 2.25 0 005.25 5.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15"
        />
        <!-- Flecha -->
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M18 12H9m0 0l3-3m-3 3l3 3"
        />
      </svg>
    </button>
  </div>
</div>

<!-- Modal de Confirmación de Logout -->
@if (showLogoutModal) {
<div
  class="fixed inset-0 z-[9999] flex items-center justify-center bg-gray-900/50 p-4 backdrop-blur-sm"
>
  <div
    class="w-full max-w-sm overflow-hidden rounded-2xl bg-white shadow-xl ring-1 ring-gray-900/5 transition-all"
  >
    <!-- Contenido -->
    <div class="p-6 text-center">
      <div
        class="mx-auto mb-4 flex h-12 w-12 items-center justify-center rounded-full bg-red-100"
      >
        <svg
          class="h-6 w-6 text-red-600"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.5"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75"
          />
        </svg>
      </div>
      <h3 class="text-lg font-semibold leading-6 text-gray-900">
        Cerrar Sesión
      </h3>
      <p class="mt-2 text-sm text-gray-500">
        ¿Estás seguro de que deseas salir del sistema?
      </p>
    </div>

    <!-- Botones -->
    <div class="flex gap-3 border-t border-gray-100 bg-gray-50 px-6 py-3">
      <button
        (click)="cancelLogout()"
        type="button"
        class="flex-1 justify-center rounded-lg border border-gray-300 bg-white px-4 py-2 text-sm font-medium text-gray-700 shadow-sm hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-gray-200"
      >
        Cancelar
      </button>
      <button
        (click)="confirmLogout()"
        type="button"
        class="flex-1 justify-center rounded-lg bg-secondary px-4 py-2 text-sm font-medium text-white shadow-sm hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-offset-2"
      >
        Sí, Salir
      </button>
    </div>
  </div>
</div>
}
