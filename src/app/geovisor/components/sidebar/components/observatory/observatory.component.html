  <div class="w-full h-full flex flex-col bg-white">
    <!-- Título de la sección -->
    <div class="px-4 py-3 border-b border-gray-200 bg-gray-50">
      <h2 class="text-sm font-bold text-gray-500 uppercase tracking-wider">
        Espacio Geográfico
      </h2>
    </div>

    <!-- Lista de Menú -->
    <div class="flex flex-col p-2 gap-1">

      <!-- Opción: Departamento -->
      <button (click)="toggleSection('departamento')" [ngClass]="{
                'bg-primary text-white shadow-sm': activeSection === 'departamento',
                'text-gray-700 hover:bg-gray-100 hover:text-primary': activeSection !== 'departamento'
              }"
              class="group flex items-center justify-between w-full px-3 py-2.5 text-sm font-medium rounded-md transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-primary/20">
        <div class="flex items-center gap-3">
          <!-- Icono representativo -->
          <mat-icon [ngClass]="{
                      'text-white': activeSection === 'departamento',
                      'text-gray-400 group-hover:text-primary': activeSection !== 'departamento'
                    }" class="transition-colors text-[20px] w-[20px] h-[20px] leading-[20px]">map</mat-icon>
          <span>DEPARTAMENTO</span>
        </div>
        <!-- Icono de flecha/acción -->
        <mat-icon [ngClass]="{
                    'text-white': activeSection === 'departamento',
                    'text-gray-300 group-hover:text-primary': activeSection !== 'departamento'
                  }" class="transition-colors text-[20px] w-[20px] h-[20px] leading-[20px]">
          {{ activeSection === 'departamento' ? 'expand_more' : 'chevron_right' }}
        </mat-icon>
      </button>

      <!-- Opción: Oficina Zonal -->
      <button (click)="toggleSection('oficina')" [ngClass]="{
                'bg-primary text-white shadow-sm': activeSection === 'oficina',
                'text-gray-700 hover:bg-gray-100 hover:text-primary': activeSection !== 'oficina'
              }"
              class="group flex items-center justify-between w-full px-3 py-2.5 text-sm font-medium rounded-md transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-primary/20">
        <div class="flex items-center gap-3">
          <!-- Icono representativo -->
          <mat-icon [ngClass]="{
                      'text-white': activeSection === 'oficina',
                      'text-gray-400 group-hover:text-primary': activeSection !== 'oficina'
                    }" class="transition-colors text-[20px] w-[20px] h-[20px] leading-[20px]">business</mat-icon>
          <span>OFICINA ZONAL</span>
        </div>
        <!-- Icono de flecha/acción -->
        <mat-icon [ngClass]="{
                    'text-white': activeSection === 'oficina',
                    'text-gray-300 group-hover:text-primary': activeSection !== 'oficina'
                  }" class="transition-colors text-[20px] w-[20px] h-[20px] leading-[20px]">
          {{ activeSection === 'oficina' ? 'expand_more' : 'chevron_right' }}
        </mat-icon>
      </button>

    </div>
  </div>
